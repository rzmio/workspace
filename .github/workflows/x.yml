name: Clone MiCode Branch

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch'
        required: true
        type: string
      target_repo:
        description: 'Target repo name'
        required: true
        type: string

jobs:
  clone:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"

      - name: Clone source
        run: git clone --branch ${{ inputs.source_branch }} https://github.com/MiCode/Xiaomi_Kernel_OpenSource kernel

      - name: Push to target
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd kernel
          git remote add target https://x-access-token:${GH_TOKEN}@github.com/rzmio/${{ inputs.target_repo }}.git
          git push target HEAD:main --force
